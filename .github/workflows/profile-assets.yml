name: Generate Profile Assets

on:
    schedule:
        - cron: "0 0 * * *" # runs once a day at midnight UTC
    workflow_dispatch: # allows manual trigger
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        # Minimum needed: the publish step pushes to the output branch. Drops every
        # other scope from the default token so a compromised action cannot open
        # PRs, write packages, edit issues, etc. (per-step scoping isn't supported).
        permissions:
            contents: write

        steps:
            - name: Prepare output directory
              run: mkdir -p dist

            # Generate the streak card directly in CI with the official action,
            # which pins its own PHP runtime. This replaces the self-hosted Vercel
            # instance: no cold-start race against GitHub's Camo proxy, and no PHP
            # version drift leaking "Deprecated" warnings into the SVG output.
            - name: Generate streak SVG
              uses: DenverCoder1/github-readme-streak-stats@51cfb8879073b4c016ce6286016de0b14d179077 # v1.7.0
              with:
                  options: "user=Medformatik&theme=tokyonight&hide_border=true&background=0D1117&ring=2C8EBB&fire=2C8EBB&currStreakLabel=2C8EBB&sideLabels=C9D1D9&dates=6E7681"
                  path: dist/streak-stats.svg
                  token: ${{ secrets.GITHUB_TOKEN }}

            # Runs after the streak step so it writes the snake SVGs into the
            # already-created, runner-owned dist/ (this Docker action runs as root,
            # which can write there, avoiding the previous ownership conflict).
            - name: Generate snake SVG
              uses: Platane/snk@e2cedf76a2c05b25d09a6428ded69727b497a700 # v3.4.1
              with:
                  github_user_name: Medformatik
                  outputs: |
                      dist/github-snake.svg
                      dist/github-snake-dark.svg?palette=github-dark

            # Single force-push (keep_history defaults to false) replaces the output
            # branch with exactly the current dist/ contents — snake + streak coexist,
            # and no stale files or commit history accumulate over time.
            - name: Push to output branch
              uses: crazy-max/ghaction-github-pages@1d6ee9b181a81033a16bd707a1401afa978daab4 # v5.0.0
              with:
                  target_branch: output
                  build_dir: dist
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
